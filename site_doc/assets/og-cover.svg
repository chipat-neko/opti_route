<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="Manrope, sans-serif">
  <!-- Fond ink -->
  <rect width="1200" height="630" fill="#0E1410"/>

  <!-- Trace de route lime decorative en bas-droite -->
  <path d="M 800 580 Q 900 480 950 500 T 1150 380 L 1200 380 L 1200 630 L 800 630 Z"
        fill="#B8F24A" opacity="0.10"/>
  <path d="M 800 580 Q 900 480 950 500 T 1150 380"
        stroke="#B8F24A" stroke-width="4" fill="none"
        stroke-linecap="round" stroke-dasharray="6 6"/>

  <!-- Pin (gros) -->
  <circle cx="1080" cy="450" r="40" fill="#B8F24A"/>
  <circle cx="1080" cy="450" r="14" fill="#0E1410"/>

  <!-- Logo coin haut gauche -->
  <g transform="translate(80, 80)">
    <rect width="60" height="60" rx="12" fill="#B8F24A"/>
    <circle cx="30" cy="22" r="8" fill="#0E1410"/>
    <path d="M 14 44 Q 22 36 30 38 T 46 28"
          stroke="#0E1410" stroke-width="3" fill="none"
          stroke-linecap="round"/>
  </g>
  <text x="160" y="120" fill="#F5F3EE" font-size="36" font-weight="800">opti_route</text>

  <!-- Titre principal -->
  <text x="80" y="280" fill="#F5F3EE" font-size="72" font-weight="800" letter-spacing="-2">
    Tournees de livraison
  </text>
  <text x="80" y="370" fill="#B8F24A" font-size="72" font-weight="800" letter-spacing="-2">
    pour les pros.
  </text>

  <!-- Sous-titre -->
  <text x="80" y="450" fill="#F5F3EE" opacity="0.7" font-size="28" font-weight="500">
    Optimisation VROOM · Scan bordereaux · Gestion equipe
  </text>
  <text x="80" y="490" fill="#F5F3EE" opacity="0.7" font-size="28" font-weight="500">
    100% local · Sans abonnement · Phase 1 gratuit
  </text>

  <!-- Footer URL -->
  <text x="80" y="580" fill="#B8F24A" font-size="20" font-weight="700"
        font-family="JetBrains Mono, monospace" letter-spacing="2">
    CHIPAT-NEKO.GITHUB.IO/OPTI_ROUTE
  </text>
