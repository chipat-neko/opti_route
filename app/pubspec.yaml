name: opti_route
description: "Optimisation de tournees de livraison multi-points"
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 2.8.1+2030

environment:
  sdk: ^3.11.5

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  drift: ^2.33.0
  drift_flutter: ^0.3.0
  sqlite3_flutter_libs: ^0.6.0+eol
  flutter_riverpod: ^3.3.1
  intl: ^0.20.2
  google_fonts: ^8.1.0
  http: ^1.6.0
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  google_mlkit_text_recognition: ^0.15.1
  image_picker: ^1.2.2
  url_launcher: ^6.3.1
  geolocator: ^14.0.0
  share_plus: ^12.0.0
  path_provider: ^2.1.5
  pdf: ^3.11.4
  file_picker: ^11.0.0
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  local_auth: ^3.0.0
  local_auth_android: ^2.0.0
  crypto: ^3.0.5
  # Package `image` pour manipuler les pixels (rotations 90/180/270)
  # lors du re-OCR en cas de bordereau scanne dans le mauvais sens.
  # Pas de plugin natif : 100 % Dart, marche aussi en web.
  image: ^4.5.4
  # Connectivity_plus : observe les changements wifi/mobile/none pour
  # declencher automatiquement le re-geocodage des arrets ajoutes en
  # mode hors-ligne (cf OfflineGeocodeAutomation).
  connectivity_plus: ^7.1.0
  # Archive : creation / lecture de zip pour le backup complet
  # (DB SQLite + photos preuves) en un seul fichier partageable.
  archive: ^4.0.7
  # flutter_tts : synthese vocale on-device pour les instructions de
  # navigation ("Tournez a droite dans 200 metres") dans le mode
  # "Suivre dans l'app". Voix systeme Android (gratuite). Etape 3 du
  # plan GPS turn-by-turn integre.
  flutter_tts: ^4.2.0
  # supabase_flutter : Phase 2 backend cloud (auth + sync chef-equipiers).
  # Pour ce jalon 1, seule l'auth email OTP est activee. Free tier UE
  # (Frankfurt/Paris), 500 MB DB, 50k MAUs -- largement assez pour
  # commencer.
  supabase_flutter: ^2.12.0
  # uuid : generation cote app de UUIDs v4 servant de cle primaire dans
  # le schema cloud Supabase (sous-jalon 2.B). Indispensable pour
  # generer l'id LOCALEMENT avant l'INSERT cloud, puis le persister
  # dans la colonne `cloud_id` Drift -- ca rend le re-push idempotent
  # et permet a 2 phones de generer en parallele sans collision.
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0
  drift_dev: ^2.33.0
  build_runner: ^2.15.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  # Utilises uniquement par les tests pour mocker path_provider
  # (BackupService et AutoBackupService dependent de
  # getApplicationDocumentsDirectory + getExternalStorageDirectory).
  # Ce sont en fait des dependances transitives de path_provider en
  # runtime, mais on les declare explicitement ici pour pouvoir les
  # importer dans test/backup_service_test.dart.
  path_provider_platform_interface: ^2.1.2
  plugin_platform_interface: ^2.1.8

# App icon : pin lime + trace de route sur fond ink, designee via
# Claude Design. Sources d'origine versionnees dans
# `assets/branding/source/` (SVG + PNG aux differentes tailles).
# `icon_source.png` et `icon_foreground.png` = copie du PNG 1024 ;
# le double-mask Android adaptive est OK car les coins arrondis du
# design tombent dans la zone safe.
# Ne cible que Android pour l'instant -- iOS sera ajoute le jour ou
# on publiera sur l'App Store.
# Regenerer apres modification : `flutter pub run flutter_launcher_icons`.
flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/branding/icon_source.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0E1410"
  adaptive_icon_foreground: "assets/branding/icon_foreground.png"

# Splash screen : icone Claude Design (carte ink avec pin + route lime)
# centree sur fond cream. Le rendu Android < 12 utilise `image`
# directement, Android 12+ utilise la section `android_12` (icone plus
# petite imposee par l'API native).
# Regenerer apres modification : `flutter pub run flutter_native_splash:create`.
flutter_native_splash:
  color: "#F5F3EE"
  image: assets/branding/splash_logo.png
  android_12:
    color: "#F5F3EE"
    image: assets/branding/splash_logo.png
    icon_background_color: "#F5F3EE"
  fullscreen: false
  android: true
  ios: false
  web: false

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # Fonts bundled localement : permet a `google_fonts` d'utiliser les
  # versions embarquees au lieu de fetcher en HTTP. Indispensable
  # pour : (1) marcher hors-ligne sans depender de fonts.gstatic.com,
  # (2) faire passer les widget_smoke_test (HTTP bloque par
  # TestWidgetsFlutterBinding). Le nom de fichier doit matcher la
  # convention Google Fonts : `<Family>-<Weight>.ttf`.
  # Total : ~350 KB d'APK.
  assets:
    - assets/fonts/

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
